spring.application.name=garage

# ---- JPA / Hibernate ----
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ---- DataSource ----
spring.datasource.url=jdbc:postgresql://localhost:5432/web_garage
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- Run scrip file ----
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:/schema.sql
spring.sql.init.data-locations=classpath:/data.sql


# ---- Gemini API ----
gemini.apiKey=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# JWT CONFIG
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION}

# RAG Configuration
rag.search.top-k=5
rag.search.similarity-threshold=0.7
rag.search.max-context-length=4000
rag.search.min-relevant-docs=1
rag.fallback.enable-ai-fallback=true

## Caching
#spring.cache.type=simple
#spring.cache.cache-names=embeddings,documentSearch
#
## Enable debug logging cho cache
#logging.level.org.springframework.cache=DEBUG
#logging.level.DACNTT.garage.service=DEBUG

cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}
cloudinary.upload-folder=web_garage

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# application.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

logging.level.org.springframework.security=DEBUG